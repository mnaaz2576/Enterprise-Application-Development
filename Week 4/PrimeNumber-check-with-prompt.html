<!DOCTYPE html>
<html>
<head>
    <title>Prime Number</title>
</head>
<body>

<script>

function checkPrime(num) {

    if (num <= 1)
        return "Not Prime";

    for (let i = 2; i <= num/2; i++) {
        if (num % i == 0)
            return "Not Prime";
    }
    return "Prime";
}

let number = prompt("Enter a number:");
let result = checkPrime(number);

alert(number + " is " + result);

</script>
