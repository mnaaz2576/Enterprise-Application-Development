<!DOCTYPE html>
<html>
<head>
    <title>Chessboard</title>

    <style>
        .board {
            width: 320px;
            display: grid;
            grid-template-columns: repeat(8, 40px);
        }

        .white {
            width: 40px;
            height: 40px;
            background-color: white;
        }

        .black {
            width: 40px;
            height: 40px;
            background-color: black;
        }
    </style>
</head>
<body>

<h1>Chess Board</h1>

<div class="board">

    <!-- Row 1 -->
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>

    <!-- Row 2 -->
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>

    <!-- Row 3 -->
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>

    <!-- Row 4 -->
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>

    <!-- Row 5 -->
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>

    <!-- Row 6 -->
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>

    <!-- Row 7 -->
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>
    <div class="white"></div><div class="black"></div>

    <!-- Row 8 -->
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>
    <div class="black"></div><div class="white"></div>

</div>
