<!DOCTYPE html>
<html>
<head>
<title>JS Control Statements and Functions</title>
</head>
 <body>
    <script>
function check_prime(x){
       let isprime=true;
       if(x<=1){
          isprime=false;}
         for(let i=2;i<x;i++){
            if(x%i===0){
              isprime=false;
              break;
}
}
return isprime;
}
 let x=4;
let result=check_prime(x);
  if(result){
     console.log(x + " is prime number");
}
else{
     console.log(x + " is not a prime number");
}
console.log("Madiha Naaz- 160124737153");
    </script>
 </body>
</html>
